spring.application.name=tas-agency-app
spring.datasource.url=jdbc:mysql://localhost:3306/db_agency
spring.datasource.username=root
spring.datasource.password=root
 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
 
server.port=8080
eureka.client.fetchRegistry=true
eureka.client.registerWithEureka=true
eureka.instance.preferIpAddress=true
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

info.app.name=tas-agency-app
info.app.description="Travel Agency System- Agency Service"
info.app.version=1.0.1

management.endpoints.web.exposure.include: *
#management.endpoint.shutdown.enabled: true
management.endpoint.shutdown.access: unrestricted
management.info.env.enabled: true
management.endpoint.health.show-details=always